<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Nexus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="max-width: 600px; width: 100%;">
            <h1 class="text-gradient">Fale Conosco</h1>
            <p style="margin-bottom: 30px;">Estamos prontos para atender seu projeto.</p>
            <form class="contact-form" style="padding: 0;">
                <input type="text" placeholder="Nome" required>
                <input type="email" placeholder="E-mail" required>
                <textarea placeholder="Sua mensagem" rows="5"></textarea>
                <button type="submit" class="btn btn-primary">Enviar</button>
            </form>
            <a href="index.html" style="display: block; margin-top: 20px; text-align: center; color: var(--text-dim); text-decoration: none;">Voltar</a>
        </div>
    </div>
</body>
</html>
