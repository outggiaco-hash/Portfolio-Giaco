<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Pedido | Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .confirm-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark-bg);
            padding: 20px;
        }
        .confirm-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .status-icon {
            width: 70px;
            height: 70px;
            background: rgba(138, 43, 226, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
        }
        .order-details {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
            border: 1px dashed var(--border);
        }
        .order-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .order-row:last-child { margin-bottom: 0; padding-top: 10px; border-top: 1px solid var(--border); font-weight: 700; }
        .label { color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="confirm-wrapper">
        <div class="confirm-card reveal active">
            <div class="status-icon">
                <i class="fa-solid fa-cart-shopping"></i>
            </div>
            <h1>Quase Pronto!</h1>
            <p>Você selecionou um item de alta performance para o seu setup.</p>

            <div class="order-details">
                <div class="order-row">
                    <span class="label">Item:</span>
                    <span id="prod-nome">Carregando...</span>
                </div>
                <div class="order-row">
                    <span class="label">Plataforma:</span>
                    <span>Nexus Cloud</span>
                </div>
                <div class="order-row">
                    <span class="label">Total:</span>
                    <span id="prod-preco" class="text-gradient">R$ 0,00</span>
                </div>
            </div>

            <button onclick="finalizar()" id="btn-finalizar" class="btn btn-primary full-width">
                Confirmar e Pagar
            </button>
            
            <a href="index.html" class="back-link" style="display: block; margin-top: 20px; color: var(--text-dim); text-decoration: none; font-size: 13px;">
                ← Cancelar e Voltar
            </a>
        </div>
    </div>

    <script>
        // Lógica para ler os dados da URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('prod-nome').innerText = params.get('produto') || 'Produto Selecionado';
        document.getElementById('prod-preco').innerText = 'R$ ' + (params.get('preco') || '0,00');

        function finalizar() {
            const btn = document.getElementById('btn-finalizar');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processando...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            setTimeout(() => {
                alert('Pedido confirmado! Em um cenário real, aqui abriria o Stripe, PayPal ou PIX.');
                window.location.href = 'index.html';
            }, 2500);
        }
    </script>
</body>
</html>
